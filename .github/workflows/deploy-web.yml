name: Deploy Web

# Closes a real gap: source fixes to netconv-core/parser/renderers or to
# web/ itself did NOT automatically reach the deployed site before this
# workflow existed — wrangler.toml even had a comment claiming this was
# "built in CI before deploy", which was aspirational, not true. Any push
# to main touching the WASM-feeding crates or web/ now rebuilds and
# redeploys automatically; no more manually running wasm-pack + wrangler
# and hoping to remember to do it after every fix.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'crates/netconv-wasm/**'
      - 'crates/netconv-core/**'
      - 'crates/netconv-parser-ios/**'
      - 'crates/netconv-render-vrp/**'
      - 'crates/netconv-render-eltex/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (release)
        run: wasm-pack build crates/netconv-wasm --target web --out-dir ../../web/wasm --release

      # Requires repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
      # (Settings -> Secrets and variables -> Actions). Without them this
      # step fails loudly, which is the correct behavior — a silent no-op
      # deploy would just reproduce the exact bug this workflow exists to fix.
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
