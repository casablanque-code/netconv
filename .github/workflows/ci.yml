name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # clippy и fmt пока информационные (continue-on-error): кодовая база
  # никогда не прогонялась через них локально (в песочнице, где писались
  # последние патчи, нет rustc/cargo вообще), так что запускать их как
  # блокирующие сейчас означало бы падать на уже существующем коде,
  # а не на новых изменениях. Сделать их обязательными — отдельная
  # задача после первого прогона и точечной чистки того, что они найдут.
  clippy:
    name: cargo clippy (informational)
    runs-on: ubuntu-latest
    needs: check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  fmt:
    name: cargo fmt --check (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
