name = "netconv"
main = "web/worker.js"
compatibility_date = "2024-09-23"

# HTML файлы — импортируются как текст в worker.js
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# WASM и JS файлы из web/wasm/ деплоятся как статические ассеты
# Собираются в CI через wasm-pack перед деплоем
[assets]
directory = "web"
binding = "ASSETS"
