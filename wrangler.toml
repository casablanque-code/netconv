name = "netconv"
main = "web/worker.js"
compatibility_date = "2024-01-01"

[build]
command = "wasm-pack build crates/netconv-wasm --target bundler --out-dir ../../web/wasm"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

